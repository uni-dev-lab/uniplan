databaseChangeLog:
  - changeSet:
      id: 7
      author: petya
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: faculty
                columnName: is_deleted
      changes:
        - addColumn:
            tableName: faculty
            columns:
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
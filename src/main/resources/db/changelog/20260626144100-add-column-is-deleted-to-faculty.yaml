databaseChangeLog:
  - changeSet:
      id: 20260626144100-1
      author: pipetkova19
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: faculty
                columnName: is_deleted
      changes:
        - addColumn:
            tableName: faculty
            columns:
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            tableName: faculty
            columnName: is_deleted
databaseChangeLog:
  - changeSet:
      id: 8
      author: petya
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: major
                columnName: is_deleted
      changes:
        - addColumn:
            tableName: major
            columns:
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
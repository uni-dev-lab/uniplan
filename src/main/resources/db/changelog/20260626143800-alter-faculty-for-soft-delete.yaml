databaseChangeLog:
  - changeSet:
      id: 20260626143800-1
      author: pipetkova19
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addColumn:
            tableName: faculty
            columns:
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: faculty
            columnName: deleted_at